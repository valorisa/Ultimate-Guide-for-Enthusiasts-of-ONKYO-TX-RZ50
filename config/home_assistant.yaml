# 🏠 Intégration Home Assistant - ONKYO TX-RZ50

> 📋 Configuration complète pour l'intégration du TX-RZ50 dans Home Assistant
> via REST API, MQTT et commandes ISCP.

## 📋 Prérequis

- Home Assistant 2024.x ou supérieur
- TX-RZ50 connecté au réseau (Wi-Fi ou Ethernet)
- Contrôle réseau activé : `Setup → Hardware → Network → Network Control = On`
- Identifiants Web Setup connus (par défaut : `admin`/`admin`)

---

## 🔌 Méthode 1 : REST API (recommandée)

### Configuration de base

```yaml
# configuration.yaml

# Variables pour l'IP et l'authentification
input_text:
  onkyo_ip:
    name: "ONKYO TX-RZ50 IP"
    initial: "192.168.1.100"
  onkyo_auth:
    name: "ONKYO Auth (base64 admin:admin)"
    initial: "YWRtaW46YWRtaW4="  # base64("admin:admin")

# Commandes REST pour le contrôle
rest_command:
  onkyo_power_on:
    url: "http://{{ states('input_text.onkyo_ip') }}/goform/formMainZone"
    method: "post"
    payload: "ctl00=PWON"
    headers:
      Authorization: "Basic {{ states('input_text.onkyo_auth') }}"
      Content-Type: "application/x-www-form-urlencoded"

  onkyo_power_off:
    url: "http://{{ states('input_text.onkyo_ip') }}/goform/formMainZone"
