## 🎬 Automatisations utiles

### Scénario Cinéma

```yaml
# automations.yaml

- alias: "Mode Cinéma - ONKYO TX-RZ50"
  trigger:
    - platform: state
      entity_id: media_player.shield_tv
      to: "playing"
  condition:
    - condition: state
      entity_id: input_select.scene_mode
      state: "cinema"
  action:
    - service: rest_command.onkyo_power_on
    - delay: "00:00:03"
    - service: rest_command.onkyo_source_tv
    - delay: "00:00:02"
    - service: rest_command.onkyo_mode_atmos
    - service: media_player.volume_set
      target:
        entity_id: media_player.onkyo_tx_rz50
      data:
        volume_level: 0.45
    - service: light.turn_off
      target:
        entity_id: light.salon
```

### Extinction automatique

```yaml
- alias: "Extinction ONKYO si inactif 2h"
  trigger:
    - platform: state
      entity_id: media_player.onkyo_tx_rz50
      to: "idle"
      for:
        hours: 2
  action:
    - service: rest_command.onkyo_power_off
  mode: single
```

### Notification mise à jour firmware

```yaml
- alias: "Alerte firmware ONKYO"
  trigger:
    - platform: time_pattern
      hours: "/6"
  action:
    - service: shell_command.check_onkyo_firmware
    - delay: "00:00:10"
    - service: notify.mobile_app
      data:
        message: "{{ states('sensor.onkyo_firmware_status') }}"
```

