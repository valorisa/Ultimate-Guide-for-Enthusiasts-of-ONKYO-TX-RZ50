## 📌 Notes importantes

- **Network Standby** : Pour que le TX-RZ50 reste joignable en veille, activer `Setup → Hardware → Network → Network Standby = On` [p.145].
- **Wake-on-LAN** : Le TX-RZ50 supporte le réveil par réseau. Utiliser le service `wake_on_lan.send_magic_packet` dans HA.
- **Limitations ZONE2/ZONE3** : Le contrôle multizone via REST est possible mais nécessite des endpoints spécifiques (`/Zone2/setPower`, etc.).
- **Sécurité** : Changer le mot de passe par défaut du Web Setup et utiliser des secrets Home Assistant (`!secret onkyo_password`).
