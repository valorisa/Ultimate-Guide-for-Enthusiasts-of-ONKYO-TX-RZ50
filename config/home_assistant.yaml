## 📡 Méthode 2 : MQTT (via script Python)

### Architecture

```
Home Assistant ──MQTT──▶ Script Python (bridge) ──HTTP/RS232──▶ TX-RZ50
```

### Configuration MQTT dans HA

```yaml
# configuration.yaml

mqtt:
  - media_player:
      name: "ONKYO TX-RZ50 MQTT"
      unique_id: onkyo_tx_rz50_mqtt
      command_topic: "onkyo/tx-rz50/command"
      state_topic: "onkyo/tx-rz50/state"
      availability_topic: "onkyo/tx-rz50/availability"
      payload_on: "ON"
      payload_off: "STANDBY"
      payload_available: "online"
      payload_not_available: "offline"
      volume_command_topic: "onkyo/tx-rz50/volume/set"
      volume_state_topic: "onkyo/tx-rz50/volume/state"
      source_command_topic: "onkyo/tx-rz50/source/set"
      source_state_topic: "onkyo/tx-rz50/source/state"
      source_list:
        - "BD/DVD"
        - "GAME"
        - "CBL/SAT"
        - "NET"
        - "USB"
        - "BLUETOOTH"
        - "TUNER"
        - "TV"
        - "PHONO"
```

### Script bridge Python (à exécuter en continu)

```python
#!/usr/bin/env python3
"""
Pont MQTT pour ONKYO TX-RZ50 - Intégration Home Assistant.

Ce script fait le lien entre les commandes MQTT reçues de Home Assistant
et l'API HTTP du TX-RZ50. Il publie également l'état actuel du récepteur.

Dépendances:
    pip install paho-mqtt requests

Usage:
    python mqtt_bridge.py --host 192.168.1.100 --mqtt-broker 192.168.1.50
"""

import argparse
import json
import logging
import sys
from pathlib import Path

import paho.mqtt.client as mqtt
import requests
from requests.auth import HTTPBasicAuth

logging.basicConfig(level=logging.INFO, format='%(asctime)s - %(levelname)s - %(message)s')
logger = logging.getLogger(__name__)

# Mappage des sources ISCP → noms lisibles
SOURCE_MAP = {
    "00": "BD/DVD", "01": "GAME", "02": "CBL/SAT", "03": "STRM BOX",
    "04": "PC", "05": "AUX", "06": "CD", "07": "TV", "08": "PHONO",
    "27": "NET", "28": "USB", "29": "BLUETOOTH", "26": "TUNER"
}

class OnkyoMQTTBridge:
    def __init__(self, onkyo_host, mqtt_broker, mqtt_port=1883, username="admin", password="admin"):
        self.onkyo_url = f"http://{onkyo_host}"
        self.auth = HTTPBasicAuth(username, password)
        self.mqtt_client = mqtt.Client()
        self.mqtt_client.on_connect = self._on_connect
        self.mqtt_client.on_message = self._on_message
        self.mqtt_broker = mqtt_broker
        self.mqtt_port = mqtt_port
        self.base_topic = "onkyo/tx-rz50"

    def _on_connect(self, client, userdata, flags, rc):
        logger.info(f"Connecté au broker MQTT avec code {rc}")
        client.subscribe(f"{self.base_topic}/command")
        client.subscribe(f"{self.base_topic}/volume/set")
        client.subscribe(f"{self.base_topic}/source/set")
        client.publish(f"{self.base_topic}/availability", "online", retain=True)

    def _on_message(self, client, userdata, msg):
        try:
            payload = msg.payload.decode()
            logger.info(f"Message reçu sur {msg.topic}: {payload}")

            if msg.topic.endswith("/command"):
                self._handle_power(payload)
            elif msg.topic.endswith("/volume/set"):
                self._handle_volume(int(payload))
            elif msg.topic.endswith("/source/set"):
                self._handle_source(payload)
        except Exception as e:
            logger.error(f"Erreur de traitement du message: {e}")

    def _handle_power(self, state):
        endpoint = "/Power/setPower"
        payload = {"power": "on" if state == "ON" else "standby"}
        try:
            resp = requests.post(f"{self.onkyo_url}{endpoint}", json=payload, auth=self.auth, timeout=5)
            resp.raise_for_status()
            self.mqtt_client.publish(f"{self.base_topic}/state", state, retain=True)
        except requests.RequestException as e:
            logger.error(f"Erreur commande power: {e}")

    def _handle_volume(self, level):
        endpoint = "/Volume/setVolume"
        payload = {"volume": max(0, min(80, level))}
        try:
            resp = requests.post(f"{self.onkyo_url}{endpoint}", json=payload, auth=self.auth, timeout=5)
            resp.raise_for_status()
            self.mqtt_client.publish(f"{self.base_topic}/volume/state", level, retain=True)
        except requests.RequestException as e:
            logger.error(f"Erreur commande volume: {e}")

    def _handle_source(self, source_name):
        # Recherche le code source dans le mappage inverse
        reverse_map = {v: k for k, v in SOURCE_MAP.items()}
        code = reverse_map.get(source_name.upper())
        if not code:
            logger.warning(f"Source inconnue: {source_name}")
            return

        endpoint = "/Source/setSource"
        payload = {"source": code}
        try:
            resp = requests.post(f"{self.onkyo_url}{endpoint}", json=payload, auth=self.auth, timeout=5)
            resp.raise_for_status()
            self.mqtt_client.publish(f"{self.base_topic}/source/state", source_name, retain=True)
        except requests.RequestException as e:
            logger.error(f"Erreur commande source: {e}")

    def poll_status(self):
        """Interroge périodiquement l'état du récepteur et publie sur MQTT."""
        try:
            resp = requests.get(f"{self.onkyo_url}/Status/getStatus", auth=self.auth, timeout=5)
            resp.raise_for_status()
            data = resp.json()
            self.mqtt_client.publish(f"{self.base_topic}/state", data.get("power", "unknown"), retain=True)
            self.mqtt_client.publish(f"{self.base_topic}/volume/state", data.get("volume", 0), retain=True)
            src_code = str(data.get("source", "00"))
            self.mqtt_client.publish(f"{self.base_topic}/source/state", SOURCE_MAP.get(src_code, "Unknown"), retain=True)
        except requests.RequestException as e:
            logger.error(f"Erreur polling status: {e}")
            self.mqtt_client.publish(f"{self.base_topic}/availability", "offline", retain=True)

    def start(self):
        self.mqtt_client.connect(self.mqtt_broker, self.mqtt_port, 60)
        self.mqtt_client.loop_start()
        logger.info("Bridge MQTT démarré. En attente de commandes...")
        try:
            while True:
                import time
                self.poll_status()
                time.sleep(30)
        except KeyboardInterrupt:
            self.mqtt_client.publish(f"{self.base_topic}/availability", "offline", retain=True)
            self.mqtt_client.loop_stop()
            logger.info("Bridge MQTT arrêté.")

def main():
    parser = argparse.ArgumentParser(description="Pont MQTT pour ONKYO TX-RZ50")
    parser.add_argument("--host", required=True, help="IP du TX-RZ50")
    parser.add_argument("--mqtt-broker", required=True, help="IP du broker MQTT")
    parser.add_argument("--mqtt-port", type=int, default=1883, help="Port MQTT (défaut: 1883)")
    parser.add_argument("--user", default="admin", help="Identifiant Web Setup")
    parser.add_argument("--pass", dest="password", default="admin", help="Mot de passe Web Setup")
    args = parser.parse_args()

    bridge = OnkyoMQTTBridge(args.host, args.mqtt_broker, args.mqtt_port, args.user, args.password)
    bridge.start()

if __name__ == "__main__":
    main()
```

