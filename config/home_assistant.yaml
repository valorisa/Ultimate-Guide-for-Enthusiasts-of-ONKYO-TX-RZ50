### Capteurs d'état (REST)

```yaml
# configuration.yaml (suite)

# Récupération de l'état via polling
rest:
  - resource: "http://{{ states('input_text.onkyo_ip') }}/Status/getStatus"
    authentication: basic
    username: admin
    password: admin
    scan_interval: 30
    sensor:
      - name: "ONKYO Power State"
        value_template: "{{ value_json.power }}"
      - name: "ONKYO Volume"
        value_template: "{{ value_json.volume }}"
      - name: "ONKYO Source"
        value_template: "{{ value_json.source }}"
      - name: "ONKYO Listening Mode"
        value_template: "{{ value_json.listening_mode }}"
```

### Template Media Player

```yaml
# configuration.yaml (suite)

media_player:
  - platform: template
    players:
      onkyo_tx_rz50:
        friendly_name: "ONKYO TX-RZ50"
        device_class: receiver
        state: >
          {% if is_state('sensor.onkyo_power_state', 'on') %}
            on
          {% else %}
            off
          {% endif %}
        volume_level: >
          {% set vol = states('sensor.onkyo_volume') | float(0) %}
          {{ (vol / 80) | round(2) }}
        source: "{{ states('sensor.onkyo_source') }}"
        source_list:
          - "BD/DVD"
          - "GAME"
          - "CBL/SAT"
          - "STRM BOX"
          - "PC"
          - "AUX"
          - "CD"
          - "TV"
          - "PHONO"
          - "NET"
          - "USB"
          - "BLUETOOTH"
          - "TUNER"
        turn_on:
          service: rest_command.onkyo_power_on
        turn_off:
          service: rest_command.onkyo_power_off
        volume_set:
          service: rest_command.onkyo_volume_set
          data:
            volume: "{{ (volume * 80) | round(0) | int }}"
        select_source:
          service: >
            {% set source_map = {
              'BD/DVD': 'rest_command.onkyo_source_bluray',
              'TV': 'rest_command.onkyo_source_tv',
              'NET': 'rest_command.onkyo_source_net',
              'BLUETOOTH': 'rest_command.onkyo_source_bt'
            } %}
            {{ source_map.get(source, 'rest_command.onkyo_source_net') }}
```

